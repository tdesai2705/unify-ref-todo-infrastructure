apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: todo-app-dev
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    # Git repository containing Helm chart
    repoURL: https://github.com/tdesai2705/unify-ref-todo-infrastructure.git
    targetRevision: main
    path: helm/todo-app
    helm:
      valueFiles:
        - values.yaml
        - envs/dev/backend-values.yaml
        - envs/dev/frontend-values.yaml
        - envs/dev/database-values.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: dev-todo-app

  syncPolicy:
    automated:
      prune: true      # Delete resources when removed from Git
      selfHeal: true   # Auto-sync when cluster state drifts
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true  # Create namespace if it doesn't exist
      - PruneLast=true        # Delete old resources last
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
