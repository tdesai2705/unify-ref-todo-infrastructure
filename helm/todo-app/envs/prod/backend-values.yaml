# Backend values for PROD environment
# Updated manually or via approved pipeline

backend:
  replicaCount: 1
  image:
    repository: tejasdesai27/todo-backend
    tag: latest
    pullPolicy: Always
  resources:
    requests:
      cpu: 20m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  env:
    FLASK_ENV: production
    SECRET_KEY: prod-secret-key-CHANGEME
    DATABASE_URL: postgresql://todouser:todopass@postgres:5432/todos
