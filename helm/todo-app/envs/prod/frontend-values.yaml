# Frontend values for PROD environment
# Updated manually or via approved pipeline

frontend:
  replicaCount: 1
  image:
    repository: tejasdesai27/todo-frontend
    tag: main-2
    pullPolicy: Always
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  env:
    SECRET_KEY: prod-secret-key-CHANGEME
    BACKEND_API_URL: http://backend:5000
    FEATURE_DUE_DATE: "true"
    FEATURE_DARK_MODE: "false"  # Disable experimental features in prod
