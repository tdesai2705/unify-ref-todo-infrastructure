# Frontend values for DEV environment
# Updated automatically by CBCI pipeline

frontend:
  replicaCount: 2
  image:
    repository: tejasdesai27/todo-frontend
    tag: main-2  # Using latest working image until develop branch pipeline runs
    pullPolicy: Always
  env:
    SECRET_KEY: dev-secret-key
    BACKEND_URL: http://backend:5000
    FEATURE_DUE_DATE: "true"
    FEATURE_DARK_MODE: "true"
